<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진로 탐색 챗봇 v2 - 나래와 함께</title>
<style>
:root{
  --primary:#4F6BED;--primary-dark:#3A52C4;--primary-light:#EEF1FE;
  --accent:#FF9F43;--accent2:#2ED1A4;--bg:#F5F7FB;--text:#2D3142;
  --muted:#8A8FA3;--card:#FFFFFF;--border:#E3E7F1;
  --bot-bubble:#FFFFFF;--user-bubble:#4F6BED;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
.app-shell{max-width:1100px;margin:0 auto;height:100vh;display:flex;flex-direction:row;overflow:hidden;}

/* 헤더/진행바 */
/* ── 3단 레이아웃 ── */
/* 좌: 단계 표시 */
.steps-panel{width:168px;min-width:148px;flex-shrink:0;background:linear-gradient(180deg,#f8f9ff 0%,#fff 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;overflow-y:auto;}
.steps-panel-top{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.steps-panel-logo{font-size:1.8rem;line-height:1;margin-bottom:4px;}

/* ── 강점 표시 (왼쪽 패널 하단) ── */
.strength-display{padding:10px 14px 12px;border-top:1px solid #e2e6f4;margin-top:4px;}
.sd-title{font-size:.64rem;font-weight:800;color:var(--primary);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.sd-chips{display:flex;flex-direction:column;gap:4px;}
.sd-chip{background:linear-gradient(135deg,#6366f1,#4F6BED);color:#fff;border-radius:7px;padding:4px 8px;font-size:.67rem;font-weight:600;line-height:1.3;}
/* ── 인물 외부 링크 버튼 ── */
.fig-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.fig-link-btn{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;color:var(--primary-dark);text-decoration:none;cursor:pointer;transition:.15s;}
.fig-link-btn:hover{background:var(--primary-light);border-color:var(--primary);}
.fig-link-btn.yt{border-color:#FF0000;color:#CC0000;}
.fig-link-btn.yt:hover{background:#fff5f5;}
/* ── 프롬프트 버전 카드 ── */
.pv-wrap{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.pv-card{background:#f8f9ff;border:1.5px solid #c7d2fe;border-radius:10px;padding:10px 12px;}
.pv-card.direct{border-style:dashed;border-color:#a5b4fc;}
.pv-num{font-size:.68rem;font-weight:800;color:var(--primary);letter-spacing:.5px;margin-bottom:4px;}
.pv-text{font-size:.78rem;color:#374151;line-height:1.55;margin-bottom:8px;}
.pv-pick-btn{background:var(--primary);color:#fff;border:none;border-radius:7px;padding:5px 14px;font-size:.78rem;font-weight:700;cursor:pointer;transition:.15s;}
.pv-pick-btn:hover{background:var(--primary-dark);}
.pv-pick-btn:disabled{background:#c7d2fe;cursor:default;}
.pv-textarea{width:100%;border:1.5px solid #c7d2fe;border-radius:7px;padding:7px 10px;font-size:.8rem;font-family:inherit;resize:vertical;margin-bottom:6px;box-sizing:border-box;}
.steps-panel-title{font-size:0.68rem;font-weight:800;color:var(--primary);letter-spacing:.8px;text-transform:uppercase;}
/* 세로 진행 단계 */
.progress-v{display:flex;flex-direction:column;padding:16px 12px 16px;}
.progress-v .ps{display:flex;gap:10px;align-items:flex-start;}
.progress-v .ps-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:26px;}
.progress-v .dot{width:26px;height:26px;border-radius:50%;background:#f0f2f8;border:2px solid #dde0ee;color:#aab;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.68rem;flex-shrink:0;transition:all .3s ease;position:relative;z-index:1;}
.progress-v .dot svg{display:none;width:12px;height:12px;}
.progress-v .ps-line{width:2px;min-height:20px;background:#e8eaf0;margin:1px 0;border-radius:1px;transition:background .3s ease;}
.progress-v .lbl-wrap{display:flex;flex-direction:column;padding-top:3px;padding-bottom:20px;}
.progress-v .lbl{font-size:0.72rem;color:#b0b4c8;font-weight:500;line-height:1.35;transition:all .3s ease;}
/* ACTIVE */
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(79,107,237,.5),0 3px 12px rgba(79,107,237,.4);}70%{box-shadow:0 0 0 6px rgba(79,107,237,0),0 3px 12px rgba(79,107,237,.4);}100%{box-shadow:0 0 0 0 rgba(79,107,237,0),0 3px 12px rgba(79,107,237,.4);}}
.progress-v .ps.active .dot{background:linear-gradient(135deg,var(--primary),#6B84F0);border-color:transparent;color:#fff;width:30px;height:30px;font-size:.75rem;animation:pulse-ring 1.8s ease-out infinite;margin-left:-2px;}
.progress-v .ps.active .lbl{color:var(--primary-dark);font-weight:800;font-size:0.78rem;}
.progress-v .ps.active .lbl-now{display:inline-block;background:var(--primary);color:#fff;font-size:.55rem;font-weight:700;border-radius:4px;padding:1px 5px;margin-top:2px;letter-spacing:.3px;}
/* DONE */
.progress-v .ps.done .dot{background:linear-gradient(135deg,#34d399,#10b981);border-color:transparent;color:#fff;}
.progress-v .ps.done .dot .num-txt{display:none;}
.progress-v .ps.done .dot svg{display:block;}
.progress-v .ps.done .ps-line{background:linear-gradient(180deg,#34d399,#10b981);}
.progress-v .ps.done .lbl{color:#6b7280;}
/* DONE — 뒤로가기 호버 */
.progress-v .ps.done.back-nav .dot{cursor:pointer;transition:all .2s;}
.progress-v .ps.done.back-nav:hover .dot{background:linear-gradient(135deg,#6366f1,#4F6BED);transform:scale(1.12);box-shadow:0 0 0 3px rgba(99,102,241,.25);}
.progress-v .ps.done.back-nav:hover .lbl{color:var(--primary);font-weight:600;cursor:pointer;}
.progress-v .lbl-now{display:none;}
.progress-v .lbl-back{font-size:.58rem;color:var(--primary);display:none;margin-top:1px;}
.progress-v .ps.done.back-nav:hover .lbl-back{display:block;}
/* 가운데: 채팅 */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
/* 우: 나래 정보 패널 */
/* info-panel 제거 */
/* ── SDS 결과지 카드 ── */
.rs-sheet{background:#fff;border:1.5px solid #c7d2fe;border-radius:12px;overflow:hidden;max-width:460px;box-shadow:0 3px 14px rgba(79,107,237,.10);}
.rs-hdr{background:#1e3a8a;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:.88rem;}
.rs-num{background:#fff;color:#1e3a8a;border-radius:4px;padding:1px 7px;font-weight:900;font-size:.8rem;flex-shrink:0;}
.rs-hdrsub{font-size:.68rem;opacity:.65;margin-left:auto;}
.rs-tbl{width:100%;border-collapse:collapse;font-size:.72rem;}
.rs-tbl th,.rs-tbl td{border:1px solid #e0e7ef;padding:5px 7px;text-align:center;vertical-align:middle;}
.rs-tbl thead{background:#f0f4ff;}
.rs-tbl th{font-size:.69rem;font-weight:600;}
.rs-tbl small{font-weight:400;font-size:.65rem;display:block;}
.rs-code-td{font-weight:800;color:#1e3a8a;font-size:.85rem;}
.rs-foot{font-size:.67rem;color:#94a3b8;margin:0;padding:7px 14px 8px;background:#f8faff;border-top:1px solid #e0e7ef;}
/* 헤더 */
header.top{padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);}
header.top h1{font-size:0.98rem;margin:0;color:var(--primary-dark);font-weight:700;}
.progress-h{display:none;}

/* 채팅창 */
.chat-window{flex:1;overflow-y:auto;padding:16px 16px 80px;display:flex;flex-direction:column;gap:10px;background:var(--bg);scroll-behavior:smooth;}
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%;}
.msg-row.bot{justify-content:flex-start;}
.msg-row.user{justify-content:flex-end;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;box-shadow:0 2px 6px rgba(79,107,237,.3);}
.bubble{max-width:76%;padding:10px 14px;border-radius:16px;font-size:0.92rem;white-space:pre-wrap;box-shadow:0 1px 2px rgba(20,30,60,0.05);}
.msg-row.bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-bottom-left-radius:4px;border-left:3px solid var(--primary-light);}
.msg-row.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px;}

/* 버튼류 */
.quick-replies{display:flex;flex-wrap:wrap;gap:7px;margin:3px 0 3px 40px;}
.qr-btn{background:#fff;border:1.5px solid var(--primary);color:var(--primary-dark);border-radius:999px;padding:7px 15px;font-size:0.83rem;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;}
.qr-btn:hover{background:var(--primary-light);}
.qr-btn:disabled{opacity:.4;cursor:not-allowed;}
.qr-btn.ghost{border-color:var(--border);color:var(--muted);}
.qr-btn.accent{border-color:var(--accent);color:#c9701c;}
.qr-btn.accent:hover{background:#fff4e8;}
.qr-btn.selected{background:var(--primary);color:#fff;}

/* 다중선택 컨테이너 */
.multi-select-wrap{margin:3px 0 3px 40px;}
.multi-select-wrap .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
.multi-select-wrap .confirm-btn{margin-top:4px;}

/* 척도 */
.scale-replies{display:flex;flex-wrap:wrap;gap:5px;margin:3px 0 3px 40px;}
.scale-replies .qr-btn{padding:7px 12px;min-width:44px;text-align:center;font-size:0.78rem;}

/* 인물 카드 */
.fig-card{display:flex;gap:10px;align-items:flex-start;}
.fig-icon{font-size:2rem;background:var(--primary-light);border-radius:10px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fig-meta h3{margin:0 0 2px;font-size:1rem;}
.fig-meta .era{color:var(--muted);font-size:0.78rem;margin-bottom:5px;}
.badge{display:inline-block;background:var(--primary);color:#fff;padding:2px 8px;border-radius:999px;font-size:0.7rem;font-weight:700;margin-right:4px;}
.badge.world{background:var(--accent);}
.badge.match{background:var(--accent2);}
.chip{display:inline-block;background:var(--primary-light);color:var(--primary-dark);padding:2px 8px;border-radius:999px;font-size:0.7rem;margin:2px 2px 2px 0;}
.subblock{margin-top:8px;}
.subblock h4{margin:0 0 2px;font-size:0.83rem;color:var(--primary-dark);}
.subblock p{margin:0;font-size:0.83rem;}

/* 한국/세계 비교 카드 */
.dual-card{display:flex;gap:10px;flex-wrap:wrap;}
.dual-card .side{flex:1;min-width:200px;border:1.5px solid var(--border);border-radius:12px;padding:12px;background:#fff;}
.dual-card .side.kor{border-color:#3A52C4;}
.dual-card .side.world{border-color:var(--accent);}
.dual-card .side-label{font-size:0.72rem;font-weight:700;margin-bottom:6px;}
.dual-card .side.kor .side-label{color:var(--primary-dark);}
.dual-card .side.world .side-label{color:#c9701c;}
.dual-card .pick-btn{width:100%;margin-top:10px;border-radius:8px;padding:8px 0;font-size:0.85rem;border:none;font-weight:700;cursor:pointer;font-family:inherit;}
.dual-card .kor .pick-btn{background:var(--primary);color:#fff;}
.dual-card .world .pick-btn{background:var(--accent);color:#fff;}

/* 특성바 */
.trait-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:0.78rem;}
.trait-row .tname{width:70px;flex-shrink:0;color:var(--muted);}
.trait-bar{flex:1;background:var(--border);border-radius:999px;height:7px;overflow:hidden;}
.trait-bar>div{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent2));border-radius:999px;}
.trait-val{width:28px;text-align:right;font-weight:700;color:var(--text);font-size:0.78rem;}

/* 최종보고서 */
.pr-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:0.83rem;}
.pr-block h3,.pr-block h4{margin:0 0 4px;}
.img-preview{max-width:100%;border-radius:10px;margin-top:6px;border:1px solid var(--border);display:block;}

/* 입력창 */
.chat-inputbar{display:flex;gap:8px;padding:10px 12px;background:#fff;border-top:1px solid var(--border);align-items:flex-end;}
.chat-inputbar textarea{flex:1;border:1px solid var(--border);border-radius:12px;padding:9px 12px;font-size:0.9rem;font-family:inherit;resize:none;max-height:88px;min-height:40px;background:#fcfdff;}
.chat-inputbar button.send{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:9px 16px;font-weight:700;font-size:0.88rem;cursor:pointer;flex-shrink:0;font-family:inherit;}
.chat-inputbar button.send:hover{background:var(--primary-dark);}
.chat-inputbar button.send:disabled{opacity:.4;cursor:not-allowed;}
.chat-inputbar.hidden{display:none;}
.chat-inputbar input[type=file]{font-size:0.8rem;flex:1;}
.career-card{border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-top:5px;font-size:0.83rem;}
.career-card b{color:var(--primary-dark);}

/* 학번 입력 전용 */
.sid-input{display:flex;gap:6px;align-items:center;padding:10px 12px;background:#fff;border-top:1px solid var(--border);}
.sid-input select,.sid-input input[type=number]{border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:0.9rem;font-family:inherit;background:#fcfdff;}
.sid-input select{width:90px;}
.sid-input input[type=number]{width:70px;}
.sid-input button{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* 타이핑 */
.typing{display:flex;gap:4px;padding:10px 14px;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;animation:blink 1.2s infinite ease-in-out;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3;}40%{opacity:1;}}


/* 새 메시지 알림 버튼 */
#newMsgBtn{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;border:none;border-radius:999px;padding:8px 18px;font-size:0.85rem;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(79,107,237,.35);display:none;z-index:100;font-family:inherit;animation:pulse .8s infinite alternate;}
@keyframes pulse{from{box-shadow:0 4px 12px rgba(79,107,237,.35);}to{box-shadow:0 6px 20px rgba(79,107,237,.65);}}
/* 인쇄 */
#printArea{display:none;}
@media print{
  body>*:not(#printArea){display:none!important;}
  #printArea{display:block!important;padding:20px;}
  #printArea .pr-block{border:1px solid #ccc;border-radius:10px;padding:10px 14px;margin-bottom:10px;}
}

@media(max-width:620px){
  .steps-panel{display:none;}
}
@media(max-width:520px){
  .bubble{max-width:86%;font-size:0.88rem;}
  .quick-replies,.scale-replies,.multi-select-wrap{margin-left:0;}
  .dual-card{flex-direction:column;}
}
</style>
</head>
<body>
<div class="app-shell">
  <!-- LEFT: 단계 패널 -->
  <aside class="steps-panel">
    <div class="steps-panel-top">
      <div class="steps-panel-logo">🦊</div>
      <div class="steps-panel-title">진행 단계</div>
    </div>
    <div class="progress-v" id="progressBar"></div>
    <div class="strength-display" id="strengthDisplay" style="display:none">
      <div class="sd-title">💪 내가 잘하는 것</div>
      <div id="strengthChips" class="sd-chips"></div>
    </div>
  </aside>
  <!-- CENTER: 채팅 -->
  <main class="chat-panel">
    <header class="top">
      <h1>🧭 나래와 함께하는 진로 탐색</h1>
    </header>
    <button id="newMsgBtn" onclick="scrollToBottom()">나래 메시지 보기 ↓</button>
    <div class="chat-window" id="chatWindow"></div>
    <!-- 학번 입력 전용 바 -->
    <div class="sid-input hidden" id="sidBar">
      <select id="sidGrade"><option value="1">1학년</option><option value="2" selected>2학년</option><option value="3">3학년</option></select>
      <select id="sidClass">
        <option value="01">1반</option><option value="02">2반</option><option value="03">3반</option>
        <option value="04">4반</option><option value="05">5반</option><option value="06">6반</option>
        <option value="07">7반</option><option value="08">8반</option><option value="09">9반</option>
        <option value="10">10반</option><option value="11">11반</option><option value="12">12반</option>
      </select>
      <input type="number" id="sidNum" min="1" max="40" placeholder="번호">
      <button onclick="onSidSubmit()">확인</button>
    </div>
    <!-- 일반 텍스트 입력 바 -->
    <div class="chat-inputbar hidden" id="textInputBar">
      <textarea id="userInput" placeholder="이곳에 입력해 보세요..." rows="1"></textarea>
      <button class="send" id="sendBtn" onclick="onSend()">전송</button>
    </div>
    <!-- 파일 입력 바 -->
    <div class="chat-inputbar hidden" id="fileInputBar">
      <input type="file" id="posterImageInput" accept="image/*">
      <button class="send" onclick="onFileSend()">첨부하기</button>
      <button class="qr-btn ghost" style="border-radius:8px;" onclick="onFileSkip()">건너뛰기</button>
    </div>
  </main>
</div>
<div id="printArea"></div>

<script>
/* ================================================================

function addMultiSelect(cats, onConfirm, maxSelect=99){
  const wrap = document.createElement('div'); wrap.className='multi-select-wrap';
  const chips = document.createElement('div'); chips.className='chips';
  const selected = new Set();
  cats.forEach(cat=>{
    const b=document.createElement('button'); b.className='qr-btn'; b.textContent=cat.icon+' '+cat.label;
    b.onclick=()=>{
      if(selected.has(cat.key)){ selected.delete(cat.key); b.classList.remove('selected'); }
      else if(selected.size<maxSelect){ selected.add(cat.key); b.classList.add('selected'); }
      confirmBtn.style.display = selected.size>0 ? '' : 'none';
    };
    chips.appendChild(b);
  });
  const confirmBtn = document.createElement('button');
  confirmBtn.className='qr-btn accent confirm-btn'; confirmBtn.textContent='선택 완료 →'; confirmBtn.style.display='none';
  confirmBtn.onclick=()=>{
    wrap.querySelectorAll('button').forEach(x=>x.disabled=true);
    const chosen = cats.filter(c=>selected.has(c.key));
    userSay(chosen.map(c=>c.icon+' '+c.label).join(', '));
    onConfirm([...selected]);
  };
  wrap.appendChild(chips); wrap.appendChild(confirmBtn);
  cw().appendChild(wrap); scrollBottom();
}

function computeRiasecFromQuiz(){
  const dims={R:0,I:0,A:0,S:0,E:0,C:0};
  const cnt={R:0,I:0,A:0,S:0,E:0,C:0};
  QUIZ_TRAITS.forEach(t=>{ const ans=state.quizAnswers[t.id]||3; dims[t.dim]+=ans; cnt[t.dim]++; });
  Object.keys(dims).forEach(k=>{ dims[k]=Math.round((dims[k]/(cnt[k]*5))*100); });
  return dims;
}

function buildInterestKeywords(){
  let kws=[];
  state.interestCats.forEach(catKey=>{
    const cat=INTEREST_CATEGORIES.find(c=>c.key===catKey);
    if(cat) kws=kws.concat(cat.keywords);
  });
  if(state.interestFree){
    state.interestFree.split(/[\s,，]+/).forEach(w=>{ if(w.trim()) kws.push(w.trim()); });
  }
  state.interestKeywords=[...new Set(kws)];
}

function computeMatches(figures){
  const r=state.riasec||{R:50,I:50,A:50,S:50,E:50,C:50};
  const dims=['R','I','A','S','E','C'];
  const maxDiff=dims.length*100;
  const kws=state.interestKeywords;

  return figures.map(f=>{
    // RIASEC 거리
    const diff=dims.reduce((s,d)=>s+Math.abs((r[d]||0)-(f[d]||0)),0);
    const riasecScore=(1-diff/maxDiff)*100;
    // 흥미 키워드 일치
    const tagMatches=kws.filter(k=>f.tags&&f.tags.some(t=>t.includes(k)||k.includes(t))).length;
    const interestScore=kws.length>0?Math.min(100,(tagMatches/Math.max(1,Math.min(kws.length,5)))*100):0;
    const total=Math.round(riasecScore*0.7+interestScore*0.3);
    return {figure:f, score:Math.max(0,Math.min(100,total))};
  }).sort((a,b)=>b.score-a.score);
}

function runMatching(){
  buildInterestKeywords();
  const gf=state.genderFilter;
  const gFilter=f=>!gf||f.gender===gf;
  const kor=FIGURES.filter(f=>f.nation==='kor'&&gFilter(f));
  const world=FIGURES.filter(f=>f.nation==='world'&&gFilter(f));
  state.matches=computeMatches(FIGURES.filter(gFilter));
  state.matchesKor=computeMatches(kor.length?kor:FIGURES.filter(f=>f.nation==='kor'));
  state.matchesWorld=computeMatches(world.length?world:FIGURES.filter(f=>f.nation==='world'));
  saveState();
}

/* ── SDS 진로탐색 결과 카드 (원본 결과지 스타일) ── */
const RIASEC_CLR={R:'#6D28D9',I:'#1D4ED8',A:'#9333EA',S:'#EA580C',E:'#DC2626',C:'#0D9488'};
const RIASEC_NM={R:'현실형',I:'탐구형',A:'예술형',S:'사회형',E:'진취형',C:'관습형'};
function buildRiasecResultSheet(riasec){
  const types=['R','I','A','S','E','C'];
  /* 헥사곤 각도: 원본과 동일하게 R=상단왼쪽(-30°), I=상단오른쪽(30°), A=오른쪽(90°), S=하단오른쪽(150°), E=하단왼쪽(210°), C=왼쪽(270°) */
  const ANG=[-30,30,90,150,210,270];
  const cx=190, cy=190, RM=118;
  const toXY=(a,r)=>{const rd=a*Math.PI/180;return [+(cx+r*Math.sin(rd)).toFixed(2),+(cy-r*Math.cos(rd)).toFixed(2)];};

  /* 정렬: 유형코드 계산 */
  const sorted=[...types].sort((a,b)=>riasec[b]-riasec[a]);
  const code=sorted.slice(0,3).join('');
  const maxVal=Math.max(...types.map(t=>riasec[t]),1);

  let svg='';
  /* 동심 헥사곤 (배경) */
  const fills=['#eef2ff','#e0e7ff','#c7d2fe','#a5b4fc','none'];
  [100,80,60,40,20].forEach((pct,pi)=>{
    const r=RM*pct/100;
    const pts=ANG.map(a=>toXY(a,r).join(',')).join(' ');
    svg+=`<polygon points="${pts}" fill="${fills[pi]}" stroke="${pct===100?'#818cf8':'#c7d2fe'}" stroke-width="${pct===100?1.8:0.7}"/>`;
  });
  /* 축선 (점선) */
  ANG.forEach(a=>{
    const [x,y]=toXY(a,RM);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#a5b4fc" stroke-width="0.7" stroke-dasharray="4,3"/>`;
  });
  /* 스케일 숫자 (오른쪽 A축) */
  [20,40,60,80,100].forEach(pct=>{
    const [x,y]=toXY(90,RM*pct/100);
    svg+=`<text x="${(x+4).toFixed(1)}" y="${(y+3).toFixed(1)}" font-size="8.5" fill="#94a3b8">${pct}</text>`;
  });
  /* 학생 폴리곤 */
  const spts=types.map((t,i)=>{const r=RM*Math.min(riasec[t],100)/100;return toXY(ANG[i],r).join(',');}).join(' ');
  svg+=`<polygon points="${spts}" fill="rgba(99,102,241,0.18)" stroke="#4F46E5" stroke-width="2.5" stroke-linejoin="round"/>`;
  /* 점수 도트 + 값 */
  types.forEach((t,i)=>{
    const val=riasec[t];
    const r=RM*Math.min(val,100)/100;
    const [x,y]=toXY(ANG[i],r);
    svg+=`<circle cx="${x}" cy="${y}" r="5" fill="${RIASEC_CLR[t]}" stroke="#fff" stroke-width="1.5"/>`;
    /* 레이블 위치: 점에서 20px 바깥 */
    const lr=r+20;
    const [lx,ly]=toXY(ANG[i],lr);
    svg+=`<text x="${lx}" y="${(ly+4).toFixed(1)}" text-anchor="middle" font-size="12.5" font-weight="800" fill="${RIASEC_CLR[t]}">${val}</text>`;
  });
  /* 유형 이름 레이블 (헥사곤 바깥) */
  const LA_OFF={R:[-6,-4],I:[6,-4],A:[10,0],S:[6,4],E:[-6,4],C:[-10,0]};
  const LA_ANC={R:'end',I:'start',A:'start',S:'start',E:'end',C:'end'};
  types.forEach((t,i)=>{
    const [bx,by]=toXY(ANG[i],RM+36);
    const [ox,oy]=LA_OFF[t]||[0,0];
    const anc=LA_ANC[t]||'middle';
    const lx=(bx+ox).toFixed(1), ly1=(by+oy).toFixed(1), ly2=(by+oy+13).toFixed(1);
    svg+=`<text x="${lx}" y="${ly1}" text-anchor="${anc}" font-size="12" font-weight="800" fill="${RIASEC_CLR[t]}">${t}</text>`;
    svg+=`<text x="${lx}" y="${ly2}" text-anchor="${anc}" font-size="10" fill="${RIASEC_CLR[t]}">${RIASEC_NM[t]}</text>`;
  });

  const svgTag=`<svg viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:380px;display:block;margin:0 auto;">${svg}</svg>`;

  /* 점수표 */
  const th=types.map(t=>`<th style="color:${RIASEC_CLR[t]}">${t}<br><small>${RIASEC_NM[t]}</small></th>`).join('');
  const td=types.map(t=>`<td style="color:${RIASEC_CLR[t]};font-weight:700;">${riasec[t]}</td>`).join('');
  const table=`<table class="rs-tbl"><thead><tr><th>영역</th><th>유형코드</th>${th}</tr></thead>
    <tbody><tr><td><b>전체</b></td><td class="rs-code-td">${code}</td>${td}</tr></tbody></table>`;

  return `<div class="rs-sheet">
    <div class="rs-hdr"><span class="rs-num">03</span><b>진로성격유형</b><span class="rs-hdrsub">유형에 따른 성격 특성 정보 (단위: 백분위)</span></div>
    ${svgTag}
    ${table}
    <p class="rs-foot">※ 전체 점수 기준 · 세부 영역별 결과는 실제 결과지를 참고하세요</p>
  </div>`;
}
function handleSidInput(sid){
  state.studentId=sid;
  const found=STUDENT_DATA.find(d=>d.id===sid);
  if(found){
    state.riasec={R:found.R,I:found.I,A:found.A,S:found.S,E:found.E,C:found.C};
    state.riasecSource='pdf';
    saveState();
    const top=Object.entries(state.riasec).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([k])=>k);
    const topLabels={R:'현실형',I:'탐구형',A:'예술형',S:'사회형',E:'진취형',C:'관습형'};
    const cardHtml=buildRiasecResultSheet(state.riasec);
    botSay([`반가워! 📋 ${sid} 검사 결과를 찾았어.`,cardHtml,`<b>${top.map(k=>topLabels[k]).join(' + ')}</b> 성향이네! 탐색 시작 전에 한 가지만 물어볼게 😊`],()=>goStage('worryCheck'));
  } else {
    botSay([`음... ${sid} 검사 결과가 없네. 괜찮아!`,'두 가지 방법 중 하나를 골라봐.'],()=>{
      addQR([
        {label:'📝 짧은 자기이해 검사 하기 (16문항)',value:'quiz'},
        {label:'⚡ 취미·흥미만으로 바로 탐색',value:'interest'}
      ],(val)=>{
        if(val==='quiz') goStage('quizIntro');
        else { state.riasecSource='interest'; goStage('worryCheck'); }
      });
    });
  }
}

const QUIZ_REACTIONS=['좋아!','기억해둘게!','알겠어!','체크 완료! ✅','오케이!'];

SH.quizResult=function(){
  const r=state.riasec;
  const sorted=Object.entries(r).sort((a,b)=>b[1]-a[1]);
  const top2=sorted.slice(0,2);
  const [k1,v1]=top2[0]; const [k2,v2]=top2[1];
  const e1=RIASEC_EXPLAIN[k1]; const e2=RIASEC_EXPLAIN[k2];
  const total=Object.values(r).reduce((s,v)=>s+v,0)||1;
  const pct1=Math.round(v1/total*100); const pct2=Math.round(v2/total*100);
  // 특성 설명 카드 HTML
  function explainCard(e,pct){
    return `<div class="career-card" style="margin-bottom:8px">
      <div style="font-size:1.3rem;margin-bottom:4px">${e.icon} <b>${e.name}</b> <span style="color:var(--primary);font-size:.8rem">(상위 ${pct}%)</span></div>
      <div style="color:#444;margin-bottom:6px">${e.summary}</div>
      <ul style="margin:0 0 0 16px;padding:0;color:#555;font-size:.85rem">
        ${e.traits.map(t=>`<li>${t}</li>`).join('')}
      </ul>
      <div style="margin-top:6px;font-size:.8rem;color:var(--primary-dark)">🔑 키워드: <b>${e.keyword}</b></div>
    </div>`;
  }
  botSay([
    '검사 완료! 결과를 분석해봤어 📊',
    `<div>${riasecBarHtml(r)}</div>`,
    `주요 성향은 <b>${e1.name} + ${e2.name}</b>! 이게 무슨 뜻인지 알아볼까? 👇`,
    explainCard(e1,pct1),
    explainCard(e2,pct2),
    `<b>${e1.name}</b>이면서 <b>${e2.name}</b>인 사람은 <b>${e1.keyword}</b>와 <b>${e2.keyword}</b>를 결합한 일에서 빛나는 경우가 많아! 이제 네 흥미를 더 탐색해보자 😊`
  ],()=>{
    addQR([{label:'계속하기 →',value:'go'}],()=>goStage('worryCheck'));
  });
};

function buildPromptVariants(){
  const dream=state.plan.dream||'나의 미래 직업';
  const f=getSelected();
  const figName=f?f.name:'';
  const figEra=f?f.era.split(' ')[0]:'';
  const style=state.poster.style;
  const self=state.poster.selfImage||'밝게 웃는 중학생';
  const sym=state.poster.symbols||'';
  const col=state.poster.colors||'';
  const ext=(state.poster.extra&&state.poster.extra!=='없음')?state.poster.extra:'';
  const selfP=`현대 학생(${self})`;
  const colP=col?`색감: ${col}. `:'';
  const symP=sym?`상징물: ${sym}. `:'';
  const extP=ext?`추가: ${ext}. `:'';
  const st=`스타일: ${style}.`;
  const v1=figName
    ?`역사 속 ${figName}(${figEra} 시대 복장)과 ${selfP}이 같은 공간에서 만나 서로를 바라보는 포스터. 미래에 ${dream}으로 활동할 학생과 역사 속 인물이 연결되는 장면. ${st} ${symP}${colP}${extP}두 인물 모두 밝고 희망찬 표정.`
    :`미래에 ${dream}으로 활동하는 ${selfP}의 모습을 담은 포스터. ${st} ${symP}${colP}${extP}자신감 넘치는 표정, 배경에 직업 관련 요소들.`;
  const v2=figName
    ?`${selfP}이 ${dream}으로 당당하게 나아가는 모습이 중심인 포스터. 배경 한쪽에 ${figName}의 실루엣이 응원하듯 배치. ${st} ${symP}${colP}${extP}주인공은 앞을 향해 나아가는 역동적인 자세.`
    :`${dream}을 향해 나아가는 ${selfP}의 역동적인 포스터. ${st} ${symP}${colP}${extP}`;
  const v3=`${sym||dream}을 중심 상징으로 한 감성적 포스터. ${figName?`${figName}과 `:''}${selfP}을 잇는 추상적 구도. ${st} ${colP}${extP}영화 포스터처럼 강렬하고 인상적인 분위기. 학생 얼굴은 실루엣이나 뒷모습으로 신비롭게.`;
  return [v1,v2,v3];
}

  h+=`<div class="pr-block"><h3>🎨 미래 꿈 포스터</h3>`;
  if(state.posterImage) h+=`<img class="img-preview" src="${state.posterImage}">`;
  h+=`<p><b>프롬프트:</b> ${escHtml(state.desc.prompt||state.poster.generated)}</p><p><b>설명:</b> ${escHtml(state.desc.description)}</p><p><b>수정한 점:</b> ${escHtml(state.desc.revision)}</p><p><b>상징물 의미:</b> ${escHtml(state.desc.symbolMeaning)}</p></div>`;
  return h;
}

function downloadReport(){
  const body=buildReportHtml();
  const css=`body{font-family:'Malgun Gothic',sans-serif;padding:20px;max-width:760px;margin:0 auto;color:#2D3142}.pr-block{border:1px solid #E3E7F1;border-radius:10px;padding:12px 16px;margin-bottom:12px}.chip{display:inline-block;background:#EEF1FE;color:#3A52C4;padding:2px 8px;border-radius:999px;font-size:.8rem;margin:2px}.trait-row{display:flex;gap:8px;align-items:center;margin-bottom:5px;font-size:.85rem}.tname{width:70px;color:#8A8FA3}.trait-bar{flex:1;background:#E3E7F1;border-radius:999px;height:7px;overflow:hidden}.trait-bar>div{height:100%;background:linear-gradient(90deg,#4F6BED,#2ED1A4)}.trait-val{width:28px;text-align:right;font-weight:700}.img-preview{max-width:100%;border-radius:10px;margin-top:8px}`;
  const full=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>진로 탐색 결과 보고서</title><style>${css}</style></head><body>${body}</body></html>`;
  const blob=new Blob([full],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='진로탐색_결과보고서.html';
  document.body.appendChild(a); a.click(); a.remove();
}
SH.final=function(){
  botSay(['🎉 활동을 모두 마쳤어! 정말 수고 많았어!',
    '결과 보고서를 다운로드해봐 📥'],()=>{
    addQR([{label:'📥 보고서 다운로드',value:'dl'}],(v)=>{
      if(v==='dl') downloadReport();
    });
  });
};
