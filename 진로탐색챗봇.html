<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진로 탐색 챗봇 - 나래와 함께 떠나는 진로 여행</title>
<style>
  :root{
    --primary:#4F6BED;
    --primary-dark:#3A52C4;
    --primary-light:#EEF1FE;
    --accent:#FF9F43;
    --accent2:#2ED1A4;
    --bg:#F5F7FB;
    --text:#2D3142;
    --muted:#8A8FA3;
    --card:#FFFFFF;
    --border:#E3E7F1;
    --radius:16px;
    --bot-bubble:#FFFFFF;
    --user-bubble:#4F6BED;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
  }
  .app-shell{max-width:760px;margin:0 auto;height:100vh;display:flex;flex-direction:column;}

  /* header / progress */
  header.top{padding:14px 16px 8px;text-align:center;background:#fff;border-bottom:1px solid var(--border);}
  header.top h1{font-size:1.15rem;margin:0 0 8px;}
  .progress{display:flex;justify-content:space-between;gap:4px;}
  .progress .pstep{flex:1;text-align:center;}
  .progress .pstep .dot{
    width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid var(--border);
    color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:700;
    margin:0 auto 4px;font-size:0.78rem;transition:.2s;
  }
  .progress .pstep .label{font-size:0.66rem;color:var(--muted);}
  .progress .pstep.active .dot{background:var(--primary);border-color:var(--primary);color:#fff;}
  .progress .pstep.active .label{color:var(--primary);font-weight:700;}
  .progress .pstep.done .dot{background:var(--accent2);border-color:var(--accent2);color:#fff;}

  /* chat window */
  .chat-window{
    flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;
    background:var(--bg);
  }
  .msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%;}
  .msg-row.bot{justify-content:flex-start;}
  .msg-row.user{justify-content:flex-end;}
  .avatar{
    width:34px;height:34px;border-radius:50%;background:var(--primary-light);
    display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;
  }
  .bubble{
    max-width:74%;padding:10px 14px;border-radius:16px;font-size:0.93rem;white-space:pre-wrap;
    box-shadow:0 1px 2px rgba(20,30,60,0.05);
  }
  .msg-row.bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .msg-row.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px;}

  /* quick replies */
  .quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 4px 42px;}
  .qr-btn{
    background:#fff;border:1.5px solid var(--primary);color:var(--primary-dark);
    border-radius:999px;padding:8px 16px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:.15s;
  }
  .qr-btn:hover{background:var(--primary-light);}
  .qr-btn:disabled{opacity:.45;cursor:not-allowed;}
  .qr-btn.accent{border-color:var(--accent);color:#c9701c;}
  .qr-btn.accent:hover{background:#fff4e8;}
  .qr-btn.ghost{border-color:var(--border);color:var(--muted);}

  /* scale quick replies (1~5) */
  .scale-replies{display:flex;gap:6px;margin:4px 0 4px 42px;flex-wrap:wrap;}
  .scale-replies .qr-btn{padding:8px 14px;min-width:48px;text-align:center;}

  /* rich cards inside bubbles */
  .fig-card{display:flex;gap:12px;align-items:flex-start;}
  .fig-icon{font-size:2.2rem;background:var(--primary-light);border-radius:12px;width:52px;height:52px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .fig-meta h3{margin:0 0 2px;font-size:1.05rem;}
  .fig-meta .era{color:var(--muted);font-size:0.8rem;margin-bottom:6px;}
  .badge{display:inline-block;background:var(--primary);color:#fff;padding:2px 9px;border-radius:999px;
    font-size:0.72rem;font-weight:700;margin-right:5px;}
  .badge.mbti{background:var(--accent2);}
  .chip{display:inline-block;background:var(--primary-light);color:var(--primary-dark);padding:3px 9px;
    border-radius:999px;font-size:0.72rem;margin:2px 3px 2px 0;}
  .sim{font-size:0.8rem;color:var(--accent2);font-weight:700;}
  .subblock{margin-top:8px;}
  .subblock h4{margin:0 0 2px;font-size:0.85rem;color:var(--primary-dark);}
  .subblock p{margin:0;font-size:0.85rem;}

  /* trait bars */
  .trait-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:0.8rem;}
  .trait-row .tname{width:84px;flex-shrink:0;color:var(--muted);}
  .trait-bar{flex:1;background:var(--border);border-radius:999px;height:8px;overflow:hidden;}
  .trait-bar > div{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent2));border-radius:999px;}
  .trait-val{width:26px;text-align:right;font-weight:700;color:var(--text);font-size:0.8rem;}

  /* career suggestion card */
  .career-card{border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-top:6px;font-size:0.85rem;}
  .career-card b{color:var(--primary-dark);}

  /* image preview */
  .img-preview{max-width:100%;border-radius:12px;margin-top:8px;border:1px solid var(--border);display:block;}

  /* final report block */
  .pr-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:0.85rem;}
  .pr-block h3,.pr-block h4{margin:0 0 4px;}

  /* input bar */
  .chat-inputbar{
    display:flex;gap:8px;padding:10px 12px;background:#fff;border-top:1px solid var(--border);
    align-items:flex-end;
  }
  .chat-inputbar textarea{
    flex:1;border:1px solid var(--border);border-radius:14px;padding:10px 12px;font-size:0.92rem;
    font-family:inherit;resize:none;max-height:90px;min-height:42px;background:#fcfdff;
  }
  .chat-inputbar button{
    background:var(--primary);color:#fff;border:none;border-radius:14px;padding:10px 16px;
    font-weight:700;font-size:0.9rem;cursor:pointer;flex-shrink:0;
  }
  .chat-inputbar button:hover{background:var(--primary-dark);}
  .chat-inputbar button:disabled{opacity:.4;cursor:not-allowed;}
  .chat-inputbar.hidden{display:none;}
  .chat-inputbar input[type=file]{font-size:0.8rem;flex:1;}

  .typing{display:flex;gap:4px;padding:10px 14px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;
    animation:blink 1.2s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3;}40%{opacity:1;}}

  /* print */
  #printArea{display:none;}
  @media print{
    body > *:not(#printArea){display:none!important;}
    #printArea{display:block!important;padding:20px;}
    #printArea h1,#printArea h2,#printArea h3{margin-top:18px;}
    #printArea .pr-block{border:1px solid #ccc;border-radius:10px;padding:10px 14px;margin-bottom:10px;}
    #printArea .pr-img{max-width:100%;}
  }

  @media (max-width:520px){
    .bubble{max-width:84%;font-size:0.9rem;}
    .quick-replies,.scale-replies{margin-left:0;}
  }
</style>
</head>
<body>
<div class="app-shell">
  <header class="top">
    <h1>🧭 진로 탐색 챗봇 - 나래와 함께 떠나는 진로 여행</h1>
    <div class="progress" id="progressBar"></div>
  </header>

  <div class="chat-window" id="chatWindow"></div>

  <div class="chat-inputbar" id="textInputBar">
    <textarea id="userInput" placeholder="이곳에 답을 입력해 보세요..." rows="1"></textarea>
    <button id="sendBtn" onclick="onSend()">전송</button>
  </div>
  <div class="chat-inputbar hidden" id="fileInputBar">
    <input type="file" id="posterImageInput" accept="image/*">
    <button onclick="onFileSend()">첨부하기</button>
    <button class="qr-btn ghost" style="border:1px solid var(--border);" onclick="onFileSkip()">건너뛰기</button>
  </div>
</div>

<div id="printArea"></div>

const STORAGE_KEY = 'careerChatbotApp_v1';
let state = {
  student:{name:'',grade:'',cls:'',number:''},
  answers:{},
  traits:{},
  matches:[],
  selectedFigureId:null,
  plan:{dream:'',reason:'',link:'',qualities:'',effort:'',inspiration:''},
  poster:{style:'사실적인 그림',symbols:'',colors:'',extra:'',generated:''},
  desc:{description:'',prompt:'',revision:'',symbolMeaning:''},
  posterImage:null,
  stage:'intro',      // 현재 대화 단계 식별자
  step:0,             // 진행 표시줄용 (0~6)
  quizIndex:0,        // 검사 진행 인덱스
  planIndex:0,
  promptIndex:0,
  descIndex:0,
  history:[]          // 채팅 로그 (재생용)
};
const INITIAL_STATE_JSON = JSON.stringify(state);

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const loaded = JSON.parse(raw);
      state = Object.assign(state, loaded);
    }
  }catch(e){}
}
function resetState(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
}

/* =========================================================
   진행 표시줄
========================================================= */
const STEP_LABELS = ['시작','검사','인물매칭','꿈/계획서','포스터제작','포스터설명','제출'];
function renderProgress(){
  const bar = document.getElementById('progressBar');
  bar.innerHTML='';
  for(let i=0;i<STEP_LABELS.length;i++){
    const div = document.createElement('div');
    div.className='pstep';
    if(i < state.step) div.className+=' done';
    if(i === state.step) div.className+=' active';
    div.innerHTML = '<div class="dot">'+(i+1)+'</div><div class="label">'+STEP_LABELS[i]+'</div>';
    bar.appendChild(div);
  }
}

/* =========================================================
   유틸
========================================================= */
function escHtml(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

/* =========================================================
   채팅 UI 헬퍼
========================================================= */
const chatWindow = ()=>document.getElementById('chatWindow');

function scrollBottom(){
  const cw = chatWindow();
  cw.scrollTop = cw.scrollHeight + 200;
}

function addBotMessageRaw(html){
  const row = document.createElement('div');
  row.className='msg-row bot';
  row.innerHTML = '<div class="avatar">🦊</div><div class="bubble">'+html+'</div>';
  chatWindow().appendChild(row);
  scrollBottom();
  return row;
}
function addUserMessageRaw(html){
  const row = document.createElement('div');
  row.className='msg-row user';
  row.innerHTML = '<div class="bubble">'+html+'</div>';
  chatWindow().appendChild(row);
  scrollBottom();
  return row;
}

/* 봇 메시지를 약간의 지연(타이핑 효과)과 함께 차례로 출력 */
function botSay(messages, done){
  if(typeof messages === 'string') messages = [messages];
  let i = 0;
  function next(){
    if(i >= messages.length){ if(done) done(); return; }
    const row = document.createElement('div');
    row.className='msg-row bot';
    row.innerHTML = '<div class="avatar">🦊</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    chatWindow().appendChild(row);
    scrollBottom();
    setTimeout(()=>{
      row.querySelector('.bubble').innerHTML = messages[i];
      scrollBottom();
      i++;
      setTimeout(next, 280);
    }, i===0?220:380);
  }
  next();
}

function userSay(text){
  addUserMessageRaw(escHtml(text));
}

/* 빠른 응답 버튼 */
function addQuickReplies(options, onPick){
  const wrap = document.createElement('div');
  wrap.className='quick-replies';
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='qr-btn'+(opt.cls?(' '+opt.cls):'');
    btn.textContent = opt.label;
    btn.onclick = ()=>{
      // 한 번 선택하면 같은 묶음의 버튼은 모두 비활성화
      wrap.querySelectorAll('button').forEach(b=>b.disabled=true);
      userSay(opt.label);
      onPick(opt.value !== undefined ? opt.value : opt.label, opt);
    };
    wrap.appendChild(btn);
  });
  chatWindow().appendChild(wrap);
  scrollBottom();
  return wrap;
}

/* 1~5 척도 버튼 */
function addScaleReplies(onPick){
  const labels = ['①전혀 아니다','②아니다','③보통이다','④그렇다','⑤매우 그렇다'];
  const wrap = document.createElement('div');
  wrap.className='scale-replies';
  labels.forEach((label,idx)=>{
    const btn = document.createElement('button');
    btn.className='qr-btn';
    btn.textContent = label;
    btn.onclick = ()=>{
      wrap.querySelectorAll('button').forEach(b=>b.disabled=true);
      userSay(label);
      onPick(idx+1);
    };
    wrap.appendChild(btn);
  });
  chatWindow().appendChild(wrap);
  scrollBottom();
  return wrap;
}

/* 텍스트 입력창 / 파일 입력창 표시 제어 */
function setTextInputMode(placeholder, onSubmit){
  document.getElementById('textInputBar').classList.remove('hidden');
  document.getElementById('fileInputBar').classList.add('hidden');
  const input = document.getElementById('userInput');
  input.placeholder = placeholder || '이곳에 답을 입력해 보세요...';
  input.value='';
  input.disabled=false;
  document.getElementById('sendBtn').disabled=false;
  state._onTextSubmit = onSubmit;
  input.focus();
}
function disableTextInput(){
  document.getElementById('textInputBar').classList.add('hidden');
  state._onTextSubmit = null;
}
function setFileInputMode(onFile, onSkip){
  document.getElementById('textInputBar').classList.add('hidden');
  document.getElementById('fileInputBar').classList.remove('hidden');
  document.getElementById('posterImageInput').value='';
  state._onFileSubmit = onFile;
  state._onFileSkip = onSkip;
}

function onSend(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;
  if(!state._onTextSubmit) return;
  const cb = state._onTextSubmit;
  input.value='';
  disableTextInput();
  userSay(text);
  cb(text);
}
/* textarea에서 Enter로 전송 (Shift+Enter는 줄바꿈) */
document.addEventListener('keydown', function(e){
  if(e.target && e.target.id==='userInput' && e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    onSend();
  }
});

function onFileSend(){
  const fileInput = document.getElementById('posterImageInput');
  const file = fileInput.files && fileInput.files[0];
  if(!file){ onFileSkip(); return; }
  const reader = new FileReader();
  reader.onload = function(ev){
    state.posterImage = ev.target.result;
    document.getElementById('fileInputBar').classList.add('hidden');
    userSay('(포스터 이미지 첨부함)');
    addBotMessageRaw('<img class="img-preview" src="'+ev.target.result+'">');
    const cb = state._onFileSubmit;
    state._onFileSubmit=null; state._onFileSkip=null;
    if(cb) cb();
  };
  reader.readAsDataURL(file);
}
function onFileSkip(){
  document.getElementById('fileInputBar').classList.add('hidden');
  userSay('(건너뛰기)');
  const cb = state._onFileSkip;
  state._onFileSubmit=null; state._onFileSkip=null;
  if(cb) cb();
}

/* 진행 단계 매핑: stage 접두사 -> progress index */
function syncProgressFromStage(stage){
  if(stage.startsWith('intro') || stage==='askClass') state.step=0;
  else if(stage.startsWith('quiz')) state.step=1;
  else if(stage.startsWith('match') || stage.startsWith('figure') || stage.startsWith('alt')) state.step=2;
  else if(stage.startsWith('dream') || stage.startsWith('plan')) state.step=3;
  else if(stage.startsWith('poster') || stage.startsWith('prompt')) state.step=4;
  else if(stage.startsWith('desc')) state.step=5;
  else if(stage.startsWith('final')) state.step=6;
  renderProgress();
}

function goStage(stage, payload){
  state.stage = stage;
  syncProgressFromStage(stage);
  saveState();
  renderStage(stage, payload);
}

/* 단계별 처리 함수를 등록하는 테이블 (아래에서 채워짐) */
const STAGE_HANDLERS = {};
function renderStage(stage, payload){
  const fn = STAGE_HANDLERS[stage];
  if(fn) fn(payload);
  else console.warn('알 수 없는 단계:', stage);
}

/* =========================================================
   성향 계산 & 인물 매칭
========================================================= */
function computeTraits(){
  const traits={};
  TRAITS.forEach(t=>{
    const qs = QUESTIONS.filter(q=>q.trait===t.key);
    const sum = qs.reduce((s,q)=>s+(state.answers[q.id]||3),0);
    traits[t.key] = sum/qs.length; // 1~5 사이 값
  });
  state.traits = traits;
}
function computeMatches(){
  const matches = FIGURES.map(f=>{
    let diffSum=0;
    TRAITS.forEach(t=>{ diffSum += Math.abs((state.traits[t.key]||0) - f.traits[t.key]); });
    const maxDiff = TRAITS.length*4;
    const sim = Math.round((1 - diffSum/maxDiff)*100);
    return {figure:f, sim:Math.max(0,sim)};
  });
  matches.sort((a,b)=>b.sim-a.sim);
  state.matches = matches;
  state.selectedFigureId = matches[0].figure.id;
}
function topTraits(n){
  return TRAITS.map(t=>({key:t.key,label:t.label,val:state.traits[t.key]||0}))
    .sort((a,b)=>b.val-a.val).slice(0,n);
}
function getFigureById(id){
  return FIGURES.find(f=>f.id===id);
}
function traitChartHtml(){
  let html='';
  TRAITS.forEach(t=>{
    const v = state.traits[t.key]||0;
    const pct = Math.round((v/5)*100);
    html += '<div class="trait-row"><div class="tname">'+t.label+'</div>'+
      '<div class="trait-bar"><div style="width:'+pct+'%"></div></div>'+
      '<div class="trait-val">'+v.toFixed(1)+'</div></div>';
  });
  return html;
}

function buildDreamSuggestions(){
  const tops = topTraits(2);
  let suggestions = [];
  tops.forEach(t=>{
    (CAREER_SUGGESTIONS[t.key]||[]).forEach(c=>suggestions.push(Object.assign({trait:t.label},c)));
  });
  const seen = new Set();
  suggestions = suggestions.filter(s=>{ if(seen.has(s.job)) return false; seen.add(s.job); return true; });
  return suggestions.slice(0,4);
}

  scrollBottom();
}

function downloadReport(){
  const reportHtml = buildReportBodyHTML();
  const styleCss = 'body{font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;padding:20px;color:#2D3142;max-width:760px;margin:0 auto;}'+
    'h1{color:#3A52C4;} h2,h3{color:#3A52C4;margin:0 0 6px;}'+
    '.pr-block{border:1px solid #E3E7F1;border-radius:10px;padding:12px 16px;margin-bottom:12px;}'+
    '.trait-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:0.85rem;}'+
    '.tname{width:90px;color:#8A8FA3;flex-shrink:0;}'+
    '.trait-bar{flex:1;background:#E3E7F1;border-radius:999px;height:8px;overflow:hidden;}'+
    '.trait-bar>div{height:100%;background:linear-gradient(90deg,#4F6BED,#2ED1A4);}'+
    '.trait-val{width:30px;text-align:right;font-weight:700;}'+
    '.chip{display:inline-block;background:#EEF1FE;color:#3A52C4;padding:3px 9px;border-radius:999px;font-size:0.8rem;margin:2px;}'+
    '.img-preview{max-width:100%;border-radius:10px;margin-top:8px;border:1px solid #E3E7F1;}';
  const fullHtml = '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>진로 탐색 결과 보고서</title><style>'+styleCss+'</style></head>'+
    '<body><h1>🧭 진로 탐색 결과 보고서</h1>'+reportHtml+'</body></html>';
  const blob = new Blob([fullHtml], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const name = state.student.name || '학생';
  a.download = '진로탐색결과_'+name+'.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function printReport(){
  document.getElementById('printArea').innerHTML = '<h1>🧭 진로 탐색 결과 보고서</h1>'+buildReportBodyHTML();
  window.print();
}

function restartApp(){
  resetState();
  state = JSON.parse(INITIAL_STATE_JSON);
  chatWindow().innerHTML='';
  disableTextInput();
  document.getElementById('fileInputBar').classList.add('hidden');
  goStage('intro');
}

STAGE_HANDLERS.final = function(){
  const reportHtml = buildReportBodyHTML();
  document.getElementById('printArea').innerHTML = '<h1>🧭 진로 탐색 결과 보고서</h1>'+reportHtml;
  botSay([
    '두구두구... 너의 진로 탐색 활동 결과를 모두 정리했어! 정말 멋진 여정이었어 🎊',
    reportHtml,
    '아래 버튼으로 결과를 파일로 저장하거나 인쇄(PDF 저장)해서 선생님께 제출해보자!'
  ], ()=>{
    addActionButtons();
  });
};

/* =========================================================
   초기화
========================================================= */
function init(){
  loadState();
  renderProgress();
  if(state.stage && state.stage!=='intro'){
    botSay('어, 이전에 진행하던 기록이 남아있네! 이어서 계속할까, 아니면 처음부터 다시 할까?', ()=>{
      addQuickReplies([
        {label:'이어서 할게 ▶', value:'resume'},
        {label:'처음부터 다시 🔁', value:'restart'}
      ], (val)=>{
        if(val==='restart'){ restartApp(); }
        else { goStage(state.stage); }
      });
    });
  }else{
    goStage('intro');
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
